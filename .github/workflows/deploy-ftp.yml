name: Deploy to FTP (Tiendanube)

on:
  push:
    branches:
      - main
  workflow_dispatch:   # permite dispararlo manualmente desde GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validar rama de deploy
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Este workflow solo puede desplegar desde main."
            exit 1
          fi

      - name: Cargar credenciales FTP de main
        run: |
          echo "FTP_HOST=${{ secrets.FTP_HOST }}"         >> $GITHUB_ENV
          echo "FTP_USER=${{ secrets.FTP_USER }}"         >> $GITHUB_ENV
          echo "FTP_PASSWORD=${{ secrets.FTP_PASSWORD }}" >> $GITHUB_ENV

      - name: Validar credenciales FTP
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "Faltan secrets FTP para desplegar."
            exit 1
          fi

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set ftp:use-site-chmod false;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u '$FTP_USER','$FTP_PASSWORD' ftp://$FTP_HOST:21;
            mirror --reverse --verbose --no-perms \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob .claude/ \
              --exclude-glob '*.md' \
              . /;
          "
