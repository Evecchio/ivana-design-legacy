name: Deploy to FTP (Tiendanube)

on:
  push:
    branches:
      - main
      - dev
      - investigacion/ivana-design-sesion
  workflow_dispatch:   # permite dispararlo manualmente desde GitHub
    inputs:
      confirmar_deploy:
        description: "Rama investigacion: escribi 'si' para confirmar deploy manual"
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verificar confirmacion de deploy (rama investigacion)
        if: github.ref_name == 'investigacion/ivana-design-sesion'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if echo "${{ github.event.head_commit.message }}" | grep -qF '[deploy]'; then
              echo "Deploy confirmado con flag [deploy]. Continuando..."
            else
              echo "Deploy omitido: no se encontro '[deploy]' en el mensaje de commit."
              echo ""
              echo "Para desplegar desde esta rama, incluí el flag en el commit:"
              echo "  git commit -m 'descripcion del cambio [deploy]'"
              exit 1
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.confirmar_deploy }}" = "si" ]; then
              echo "Deploy manual confirmado. Continuando..."
            else
              echo "Deploy omitido: para trigger manual escribi 'si' en el campo de confirmacion."
              exit 1
            fi
          fi

      - name: Seleccionar credenciales FTP segun branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "FTP_HOST=${{ secrets.FTP_HOST }}"         >> $GITHUB_ENV
            echo "FTP_USER=${{ secrets.FTP_USER }}"         >> $GITHUB_ENV
            echo "FTP_PASSWORD=${{ secrets.FTP_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "FTP_HOST=${{ secrets.FTP_HOST_DEV }}"         >> $GITHUB_ENV
            echo "FTP_USER=${{ secrets.FTP_USER_DEV }}"         >> $GITHUB_ENV
            echo "FTP_PASSWORD=${{ secrets.FTP_PASSWORD_DEV }}" >> $GITHUB_ENV
          fi

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set ftp:use-site-chmod false;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u '$FTP_USER','$FTP_PASSWORD' ftp://$FTP_HOST:21;
            mirror --reverse --verbose --no-perms \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob .claude/ \
              --exclude-glob '*.md' \
              --exclude-glob sesiones/ \
              . /;
          "
