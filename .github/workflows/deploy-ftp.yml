name: Deploy to FTP (Tiendanube)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy via FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          : "${FTP_HOST:?Missing FTP_HOST secret}"
          : "${FTP_USER:?Missing FTP_USER secret}"
          : "${FTP_PASSWORD:?Missing FTP_PASSWORD secret}"

          for attempt in 1 2 3 4 5; do
            echo "FTPS deploy attempt $attempt/5"

            if lftp -u "$FTP_USER","$FTP_PASSWORD" "ftp://$FTP_HOST:21" <<'LFTP'
              set ftp:ssl-force true;
              set ftp:ssl-protect-data true;
              set ssl:verify-certificate false;
              set ftp:use-site-chmod false;
              set net:timeout 30;
              set net:max-retries 3;
              set net:reconnect-interval-base 5;
              mirror --reverse --verbose --no-perms \
                --exclude-glob .git/ \
                --exclude-glob .github/ \
                --exclude-glob .claude/ \
                --exclude-glob .vscode/ \
                --exclude-glob '*.md' \
                --exclude-glob '*.vsix' \
                --exclude-glob acceso-ftp.txt \
                --exclude-glob solution.js \
                --exclude-glob sesiones/ \
                . /;
          LFTP
            then
              exit 0
            fi

            sleep 30
          done

          exit 1
